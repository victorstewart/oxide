name: OxideHost
options:
  developmentLanguage: en
  deploymentTarget:
    iOS: 18.0
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
targets:
  OxideHost:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - OxideHost.xcodeproj
          - project.yml
          - OxideHostUITests
          - Resources
    resources:
      - Info.plist
      - capabilities.toml
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oxideui.host
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_BITCODE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        OTHER_LDFLAGS:
          - "-ObjC"
          - "-lc++"
          - "-framework"
          - UIKit
          - "-framework"
          - Foundation
          - "-framework"
          - QuartzCore
          - "-framework"
          - Metal
          - "-framework"
          - CoreGraphics
          - "-framework"
          - UserNotifications
          - "-framework"
          - CoreLocation
          - "-framework"
          - AVFoundation
          - "-framework"
          - Contacts
          - "-framework"
          - CoreBluetooth
          - "-framework"
          - CoreMotion
        INFOPLIST_FILE: Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
    scripts:
      - name: Embed Rust Staticlib
        shell: /bin/sh
        script: |
          set -euo pipefail
          PROJECT_DIR="${PROJECT_DIR}"
          REPO_ROOT="$(cd "${PROJECT_DIR}/../../.." && pwd)"
          export CARGO_TARGET_DIR="${REPO_ROOT}/target"
          mkdir -p "${BUILT_PRODUCTS_DIR}"
          case "${PLATFORM_NAME}" in
            iphoneos)
              cargo build --package oxideui-host-ios --release --target aarch64-apple-ios
              cp "${CARGO_TARGET_DIR}/aarch64-apple-ios/release/liboxideui_host_ios.a" "${BUILT_PRODUCTS_DIR}/liboxideui_host_ios.a"
              ;;
            iphonesimulator)
              cargo build --package oxideui-host-ios --release --target aarch64-apple-ios-sim
              cargo build --package oxideui-host-ios --release --target x86_64-apple-ios
              lipo -create                 "${CARGO_TARGET_DIR}/aarch64-apple-ios-sim/release/liboxideui_host_ios.a"                 "${CARGO_TARGET_DIR}/x86_64-apple-ios/release/liboxideui_host_ios.a"                 -output "${BUILT_PRODUCTS_DIR}/liboxideui_host_ios.a"
              ;;
            *)
              cargo build --package oxideui-host-ios --release --target aarch64-apple-ios-sim
              cp "${CARGO_TARGET_DIR}/aarch64-apple-ios-sim/release/liboxideui_host_ios.a" "${BUILT_PRODUCTS_DIR}/liboxideui_host_ios.a"
              ;;
          esac
    scheme:
      testTargets:
        - OxideHostUITests
  OxideHostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OxideHostUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oxideui.host.UITests
        INFOPLIST_FILE: OxideHostUITests/Info.plist
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
    dependencies:
      - target: OxideHost
