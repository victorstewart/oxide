[[experiments]]
id = "c27-spatial-metadata"
introduced_commit = "C27 staged tree recorded in commit proof"
introduced_date = "2026-07-13"
expires = "2027-07-13"
required_backends = ["oxide-renderer-api", "oxide-renderer-metal", "oxide-perf-runner"]
required_devices = ["Apple M2 Max Metal"]
correctness_gate = "Conservative AA/effect/glyph/mesh bounds, nested clips, matching scope ranges, affine instance bounds, paint order, image-mesh transform/opacity, full/small output, resource invalidation, and physical property-ring safety must remain exact."
performance_gate = "Fifteen balanced fresh-process pairs with 250 samples per side after 128 warmups must materially improve the 10,000-instance two-pixel damage frame/encode distributions, protect direct GPU p50/p95/p99/peak, and protect full-damage frame/encode/GPU tails; small damage must visit one instance/command and zero vertices while full damage reuses one validated static plan."
decision_state = "accepted"
decision = "Prepare conservative chunk and property-free snapshot spatial metadata once, query it in paint order for small Metal damage, persist image-mesh geometry, and reuse validated unchanged full-frame plans."
proof = [
   "The final exact-tree small/full frame, encode, and direct-GPU reports under benchmarks/experiments/c27-spatial-metadata/raw retain parent/candidate tree, binary, instrumentation, raw-sample, order, and decision identities.",
   "The permanent 10,000-instance small row reports one visited/matched instance and command, zero vertex visits, one draw, zero copied/uploaded geometry, and four shaded pixels; full damage reports zero query visits, 10,000 draws, zero copied/uploaded geometry, and one reused plan.",
   "Renderer API and Metal snapshot tests freeze conservative outsets, nested scope resolution, affine queries, exact prepared image-mesh pixels, exact full/small spatial pixels, and completion-safe full-plan replay.",
]
cleanup = [
   "Kept the compact x-sweep index only for property-free snapshots with at least 32 instances; dynamic-property snapshots retain the C26 fast construction path and resolve linearly only when explicitly queried.",
   "Retained the legacy direct draw-list damage filter for compatibility callers; retained snapshot Metal replay no longer performs per-frame glyph/mesh vertex scans, and layer-span consumption remains the C29 cache-owner step.",
]

[[experiments]]
id = "c27-eager-dynamic-snapshot-spatial-preparation-rejected"
introduced_commit = "rejected during C27 C26-guard review"
introduced_date = "2026-07-13"
expires = "2027-07-13"
required_backends = ["oxide-renderer-api", "oxide-ui-core", "oxide-perf-runner"]
required_devices = ["Apple M2 Max CPU"]
correctness_gate = "Any snapshot spatial representation must preserve affine bounds, clip intersections, paint order, and the C26 dynamic property contract."
performance_gate = "Adding C27 metadata must not materially regress the existing 300-node dynamic-property UiSurface row."
decision_state = "rejected"
decision = "Rejected eagerly resolving every instance and building an index for every snapshot because dynamic animation reconstructs snapshots each frame and does not consume the index on full damage."
proof = [
   "The C26 guard moved from its committed 26.664 us/op median to about 61.056 us/op with eager per-snapshot resolution, a roughly 129% regression.",
   "Restricting retained instance indices to large property-free snapshots restored the same row to the 26.9 us/op range in repeated guards.",
]
cleanup = [
   "Removed eager resolved arrays from property-driven snapshots; no runtime switch or alternate eager path remains.",
]

[[experiments]]
