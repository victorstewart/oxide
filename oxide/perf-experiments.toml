[[experiments]]
id = "c25-webgpu-persistent-prepared-chunks"
introduced_commit = "C25 staged tree recorded in commit proof"
introduced_date = "2026-07-13"
expires = "2027-07-13"
required_backends = ["oxide-renderer-web", "oxide-host-web", "oxide-perf-runner"]
required_devices = ["Chrome WebGPU over ANGLE Metal"]
correctness_gate = "Prepared and flat 1,200 x 800 mixed captures must be byte-identical; clean replay must traverse, copy, and upload zero immutable work; one dirty chunk must rebuild only that chunk; bundle/direct splitting, tiny and dynamic fallback, effects/layers, device generation, resize, resource update/release/recreation, zero budget, eviction, and cache accounting must remain exact."
performance_gate = "Fifteen balanced fresh-process clean and one-dirty pairs must materially improve renderer-encode p50 with p95/p99/peak protection; ten independent RAF pairs must contribute at least 2,000 displayed-frame samples per side with no p50/p95/p99/peak regression; the measured 8-draw policy must not force bundles on tiny or dynamic scenes."
decision_state = "accepted"
decision = "Persist supported WebGPU chunk buffers and lowering plans under a revision/device-aware logical-byte LRU, replay a wholly static-compatible snapshot through one generation-checked aggregate render bundle, and retain ordered chunk-local bundle/direct or flat boundaries for incompatible work."
proof = [
   "The final exact-tree clean-encode, dirty-encode, and RAF reports under benchmarks/experiments/c25-webgpu-prepared-chunks/raw retain source/artifact/instrumentation identities, balanced fresh-process pairs, raw distributions, and strict decisions.",
   "The pre-documentation populations improved clean and one-dirty renderer encode by 88.500% and 85.302% with every encode tail accepted; 3,000 RAF frames per side preserved p50 and improved p95/p99/peak.",
   "Every clean candidate process reports 256 hits, zero misses/traversal/copy/upload, one aggregate bundle replay/execute call, 7,680 bundle draws, and zero prepared-direct draws; every dirty candidate process reports 255 hits, one miss, eight traversed commands, 684 uploaded bytes, the same aggregate counts, and zero recurring bundle or buffer creation.",
   "The final 1,200 x 800 flat/prepared PNGs have pixdiff=0, max error=0, MSE=0.000, and identical SHA-256 a922fb9c671f53252bdaa319d8a657f3789fbf7c4c0b56e85599cf2689c32abe; the browser lifecycle guard passes every declared invalidation and fallback boundary.",
]
cleanup = [
   "Kept the eight-draw aggregate-bundle threshold with a 64-command scene floor after the complete 8/16/32/64 sweep and long tail probes; removed no production fallback required for exact effects, layers, dynamic properties, clips, or target changes.",
   "Kept same-layout revision churn on generation-stable buffers and one unchanged aggregate bundle rather than rebuilding bundle commands every frame, and made zero budget bypass preparation before resource creation.",
]

[[experiments]]
id = "c25-unpaced-completed-frame-primary-and-four-bundle-repair-rejected"
introduced_commit = "rejected during C25 final tail review"
