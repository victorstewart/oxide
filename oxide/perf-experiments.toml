   "A side 65,536 iterations: 152.833 and 152.066 us_per_iter, bytes_per_iter 158970",
   "B side 65,536 iterations: 151.467 and 151.210 us_per_iter, bytes_per_iter 158970",
   "the retained helper is used by write_report_json and the JSON render bench so persisted baseline writes use the measured path",
]
cleanup = [
   "Replaced serde_json::to_vec_pretty in write_report_json and the JSON render bench with a shared pre-sized Vec serializer.",
   "Kept collect_suite_json unchanged because the measured persisted JSON write path already uses the retained helper.",
]

