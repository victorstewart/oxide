decision_state = "rejected"
decision = "Rejected ten-frame unpaced completed-batch latency as the C25 primary after it coupled faster CPU submission to browser surface backpressure; also rejected splitting the aggregate into four persistent bundles because it did not repair that synthetic p95."
proof = [
   "The 60-pair one-bundle population won 60/60 medians by 46.265% and improved peak to 28.501 from 31.251 ms, but failed p95/p99 at 23.066/25.341 versus 21.932/23.666 ms.",
   "Four bundles in one execute call won all 15 pilot medians by 48.544% and improved p99/peak, but still failed p95 at 22.193 versus 20.311 ms, ruling out one oversized bundle object as the tail cause.",
   "Phase attribution showed clean renderer encode at 0.080 versus 0.711 ms and direct GPU p50 at about 0.348 versus 0.607 ms; the independent 3,000-frame RAF population accepted p50/p95/p99/peak, so the retained protocol separates lowering throughput from real displayed pacing.",
]
cleanup = [
   "Removed the four-bundle runtime variant and retained one aggregate bundle plus one execute call; kept the unpaced distribution in raw evidence as a rejected diagnostic rather than hiding it.",
]

