<!doctype html>
<html lang="en">
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Oxide WebAssembly Host</title>
      <style>
         html,
         body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
         }

         #oxide-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            background: transparent;
         }
      </style>
   </head>
   <body>
      <canvas id="oxide-canvas"></canvas>
      <script id="oxide-browser-report-json" type="application/json"></script>
      <script type="module">
         import init, { OxideWebApp, platform_smoke_report, start_oxide_async, webgpu_smoke_report, webgpu_timing_report } from "./pkg/oxide_host_web.js";

         const params = new URLSearchParams(window.location.search);
         const boundedNumber = (name, fallback, min, max) => {
            const value = Number(params.get(name));
            if (!Number.isFinite(value)) {
               return fallback;
            }
            return Math.max(min, Math.min(max, Math.trunc(value)));
         };
         const frameSamples = boundedNumber("frame_samples", 8, 1, 30);
         const framesPerSample = boundedNumber("frames_per_sample", 30, 1, 120);
         const idMaskSamples = boundedNumber("id_mask_samples", 6, 1, 30);
         const idMaskFrames = boundedNumber("id_mask_frames", 24, 1, 120);
         const uploadSamples = boundedNumber("upload_samples", 6, 1, 30);
         const uploadFrames = boundedNumber("upload_frames", 24, 1, 120);
         const scene3dSamples = boundedNumber("scene3d_samples", 6, 1, 30);
         const scene3dFrames = boundedNumber("scene3d_frames", 24, 1, 120);
         const mixedSamples = boundedNumber("mixed_samples", 6, 1, 30);
         const mixedFrames = boundedNumber("mixed_frames", 24, 1, 120);
         const captureTarget = params.get("capture_target") || "app";
         const captureOnly = params.get("capture_only") === "1";
         const captureWidth = boundedNumber("capture_width", Math.max(1, Math.trunc(window.innerWidth || 512)), 1, 4096);
         const captureHeight = boundedNumber("capture_height", Math.max(1, Math.trunc(window.innerHeight || 512)), 1, 4096);
         const benchTimeoutMs = boundedNumber("bench_timeout_ms", 60000, 1000, 300000);
         const nextAnimationFrame = () => new Promise(resolve => requestAnimationFrame(resolve));
         const benchMarkPrefix = "oxide-webgpu-bench";
         const benchMarks = [];
         let wasmModule = null;
         let pendingBenchmarkId = "";
         let postedErrorReport = false;
         const wasmMemoryBytes = () => wasmModule?.memory?.buffer?.byteLength ?? 0;
         const errorDetail = error => {
            if (error && typeof error.message === "string") {
               return error.message;
            }
            return String(error);
         };
         const postErrorReport = async (id, error) => {
            if (postedErrorReport || params.get("report_endpoint") !== "1") {
               return;
            }
            postedErrorReport = true;
            const report = {
               benchmark_error: {
                  id,
                  detail: errorDetail(error),
               },
               benchmark_marks: benchMarks,
            };
            document.getElementById("oxide-browser-report-json").textContent = JSON.stringify(report);
            document.documentElement.dataset.oxideReportReady = "1";
            await fetch("/__oxide_report", {
               method: "POST",
               headers: { "Content-Type": "application/json" },
               body: JSON.stringify(report),
            });
         };
         const withBenchTimeout = (id, promise) => new Promise((resolve, reject) => {
            const timer = setTimeout(() => reject(new Error(`benchmark ${id} timed out after ${benchTimeoutMs}ms`)), benchTimeoutMs);
            Promise.resolve(promise).then(
               value => {
                  clearTimeout(timer);
                  resolve(value);
               },
               error => {
                  clearTimeout(timer);
                  reject(error);
               },
            );
         });
         const runBench = async (id, action) => {
            const start = `${benchMarkPrefix}:${id}:start`;
            const end = `${benchMarkPrefix}:${id}:end`;
            const measure = `${benchMarkPrefix}:${id}`;
            const wasmBeforeBytes = wasmMemoryBytes();
            let benchError = null;
            let result = "";
            pendingBenchmarkId = id;
            performance.mark(start);
            try {
               result = await withBenchTimeout(id, action());
            } catch (error) {
               benchError = error;
            } finally {
               const wasmAfterBytes = wasmMemoryBytes();
               performance.mark(end);
               performance.measure(measure, start, end);
               const entries = performance.getEntriesByName(measure, "measure");
               const entry = entries[entries.length - 1];
               benchMarks.push({
                  id,
                  name: measure,
                  start_ms: Math.round(entry.startTime * 1000) / 1000,
                  duration_ms: Math.round(entry.duration * 1000) / 1000,
                  wasm_memory_before_bytes: wasmBeforeBytes,
                  wasm_memory_after_bytes: wasmAfterBytes,
                  wasm_memory_growth_bytes: Math.max(0, wasmAfterBytes - wasmBeforeBytes),
               });
               pendingBenchmarkId = "";
            }
            if (benchError) {
               await postErrorReport(id, benchError);
               throw benchError;
            }
            return result;
         };
         window.addEventListener("error", event => {
            void postErrorReport(pendingBenchmarkId || "page-error", event.error || event.message);
         });
         window.addEventListener("unhandledrejection", event => {
            void postErrorReport(pendingBenchmarkId || "unhandled-rejection", event.reason);
         });

         wasmModule = await init();
         window.oxidePlatformSmoke = platform_smoke_report();
         console.log("oxide-platform-smoke", window.oxidePlatformSmoke);
         window.oxideWebGpuSmoke = await webgpu_smoke_report();
         console.log("oxide-webgpu-smoke", window.oxideWebGpuSmoke);
         window.oxideWebGpuTiming = await webgpu_timing_report();
         console.log("oxide-webgpu-timing", window.oxideWebGpuTiming);
         window.oxideWebGpuAppSnapshot = "";
         window.oxideWebGpuScene3dSnapshot = "";
         window.oxideWebGpuIdMaskSnapshot = "";
         if (captureTarget === "app" && captureOnly) {
            window.oxideApp = await OxideWebApp.newAsync("oxide-canvas");
            window.oxideWebGpuAppSnapshot = window.oxideApp.render_webgpu_app_snapshot();
            console.log("oxide-webgpu-app-snapshot", window.oxideWebGpuAppSnapshot);
            for (let frame = 0; frame < 8; frame += 1) {
               await nextAnimationFrame();
            }
         } else if (captureTarget === "scene3d") {
            window.oxideApp = await OxideWebApp.newAsync("oxide-canvas");
            window.oxideWebGpuScene3dSnapshot = window.oxideApp.render_webgpu_scene3d_snapshot(captureWidth, captureHeight);
            console.log("oxide-webgpu-scene3d-snapshot", window.oxideWebGpuScene3dSnapshot);
            if (captureOnly) {
               for (let frame = 0; frame < 3; frame += 1) {
                  await nextAnimationFrame();
               }
            }
         } else if (captureTarget === "id-mask") {
            window.oxideApp = await OxideWebApp.newAsync("oxide-canvas");
            window.oxideWebGpuIdMaskSnapshot = window.oxideApp.render_webgpu_id_mask_snapshot();
            console.log("oxide-webgpu-id-mask-snapshot", window.oxideWebGpuIdMaskSnapshot);
            if (captureOnly) {
               for (let frame = 0; frame < 3; frame += 1) {
                  await nextAnimationFrame();
                  window.oxideWebGpuIdMaskSnapshot = window.oxideApp.render_webgpu_id_mask_snapshot();
               }
               await nextAnimationFrame();
            }
         } else {
            window.oxideApp = await OxideWebApp.newAsync("oxide-canvas");
            if (params.get("report_endpoint") !== "1") {
               window.oxideApp.start();
            }
            window.oxideApp.frame();
         }
         console.log("oxide-renderer-backend", window.oxideApp.renderer_backend());
         console.log("oxide-render-smoke", `draws=${window.oxideApp.last_draw_count()}`);
         window.oxideWebPerf = "";
         window.oxideWebGpuIdMaskAB = "";
         window.oxideWebGpuUploadAB = "";
         window.oxideWebGpuUploadScratchAB = "";
         window.oxideWebGpuEffectUniformAB = "";
         window.oxideWebGpuBackdropBatchAB = "";
         window.oxideWebGpuScene3dAB = "";
         window.oxideWebGpuMixedMatrix = "";
         window.oxideWebGpuLayerEffectsMatrix = "";
         window.oxideWebGpuCommandFamilyMatrix = "";
         window.oxideWebGpuDrawStateCacheAB = "";
         window.oxideWebGpuClipStateAB = "";
         window.oxideWebBenchmarkMarks = benchMarks;
         if (!captureOnly) {
            window.oxideApp.prewarm_webgpu_bench_resources();
            window.oxideWebPerf = await runBench("frame_loop", () => window.oxideApp.bench_frame_samples(frameSamples, framesPerSample));
            console.log("oxide-web-perf", window.oxideWebPerf);
            window.oxideWebGpuIdMaskAB = await runBench("id_mask_ab", () => window.oxideApp.bench_webgpu_id_mask_ab(idMaskSamples, idMaskFrames));
            console.log("oxide-webgpu-id-mask-ab", window.oxideWebGpuIdMaskAB);
            window.oxideWebGpuUploadAB = await runBench("upload_ab", () => window.oxideApp.bench_webgpu_upload_ab(uploadSamples, uploadFrames));
            console.log("oxide-webgpu-upload-ab", window.oxideWebGpuUploadAB);
            window.oxideWebGpuUploadScratchAB = await runBench("upload_scratch_ab", () => window.oxideApp.bench_webgpu_upload_scratch_ab(uploadSamples, uploadFrames));
            console.log("oxide-webgpu-upload-scratch-ab", window.oxideWebGpuUploadScratchAB);
            window.oxideWebGpuEffectUniformAB = await runBench("effect_uniform_ab", () => window.oxideApp.bench_webgpu_effect_uniform_ab(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-effect-uniform-ab", window.oxideWebGpuEffectUniformAB);
            window.oxideWebGpuBackdropBatchAB = await runBench("backdrop_batch_ab", () => window.oxideApp.bench_webgpu_backdrop_batch_ab(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-backdrop-batch-ab", window.oxideWebGpuBackdropBatchAB);
            window.oxideWebGpuScene3dAB = await runBench("scene3d_ab", () => window.oxideApp.bench_webgpu_scene3d_ab(scene3dSamples, scene3dFrames));
            console.log("oxide-webgpu-scene3d-ab", window.oxideWebGpuScene3dAB);
            window.oxideWebGpuMixedMatrix = await runBench("mixed_matrix", () => window.oxideApp.bench_webgpu_mixed_matrix(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-mixed-matrix", window.oxideWebGpuMixedMatrix);
            window.oxideWebGpuLayerEffectsMatrix = await runBench("layer_effects_matrix", () => window.oxideApp.bench_webgpu_layer_effects_matrix(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-layer-effects-matrix", window.oxideWebGpuLayerEffectsMatrix);
            window.oxideWebGpuCommandFamilyMatrix = await runBench("command_family_matrix", () => window.oxideApp.bench_webgpu_command_family_matrix(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-command-family-matrix", window.oxideWebGpuCommandFamilyMatrix);
            window.oxideWebGpuDrawStateCacheAB = await runBench("draw_state_cache_ab", () => window.oxideApp.bench_webgpu_draw_state_cache_ab(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-draw-state-cache-ab", window.oxideWebGpuDrawStateCacheAB);
            window.oxideWebGpuClipStateAB = await runBench("clip_state_cache_ab", () => window.oxideApp.bench_webgpu_clip_state_ab(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-clip-state-ab", window.oxideWebGpuClipStateAB);
            if (captureTarget === "id-mask") {
               window.oxideWebGpuIdMaskSnapshot = window.oxideApp.render_webgpu_id_mask_snapshot();
               console.log("oxide-webgpu-id-mask-snapshot", window.oxideWebGpuIdMaskSnapshot);
            }
         }
         const report = {
            platform: window.oxidePlatformSmoke,
            webgpu: window.oxideWebGpuSmoke,
            webgpu_timing: window.oxideWebGpuTiming,
            backend: window.oxideApp.renderer_backend(),
            render: `draws=${window.oxideApp.last_draw_count()}`,
            frame_perf: window.oxideWebPerf,
            id_mask_ab: window.oxideWebGpuIdMaskAB,
            upload_ab: window.oxideWebGpuUploadAB,
            upload_scratch_ab: window.oxideWebGpuUploadScratchAB,
            effect_uniform_ab: window.oxideWebGpuEffectUniformAB,
            backdrop_batch_ab: window.oxideWebGpuBackdropBatchAB,
            scene3d_ab: window.oxideWebGpuScene3dAB,
            mixed_matrix: window.oxideWebGpuMixedMatrix,
            layer_effects_matrix: window.oxideWebGpuLayerEffectsMatrix,
            command_family_matrix: window.oxideWebGpuCommandFamilyMatrix,
            draw_state_cache_ab: window.oxideWebGpuDrawStateCacheAB,
            clip_state_ab: window.oxideWebGpuClipStateAB,
            benchmark_marks: window.oxideWebBenchmarkMarks,
            capture_target: captureTarget,
            app_snapshot: window.oxideWebGpuAppSnapshot,
            scene3d_snapshot: window.oxideWebGpuScene3dSnapshot,
            id_mask_snapshot: window.oxideWebGpuIdMaskSnapshot,
         };
         document.getElementById("oxide-browser-report-json").textContent = JSON.stringify(report);
         document.documentElement.dataset.oxideReportReady = "1";
         if (params.get("report_endpoint") === "1") {
            await fetch("/__oxide_report", {
               method: "POST",
               headers: { "Content-Type": "application/json" },
               body: JSON.stringify(report),
            });
         }
      </script>
   </body>
</html>
