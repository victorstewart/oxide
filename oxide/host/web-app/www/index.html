<!doctype html>
<html lang="en">
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Oxide WebAssembly Host</title>
      <style>
         html,
         body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
         }

         #oxide-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            background: transparent;
         }
      </style>
   </head>
   <body>
      <canvas id="oxide-canvas"></canvas>
      <script id="oxide-browser-report-json" type="application/json"></script>
      <script type="module">
         import init, { OxideWebApp, bench_canvas_indexed_quads, platform_smoke_report, start_oxide_async, webgpu_smoke_report, webgpu_timing_report } from "./pkg/oxide_host_web.js";

         const pageStartMs = performance.now();
         const params = new URLSearchParams(window.location.search);
         const boundedNumber = (name, fallback, min, max) => {
            if (!params.has(name)) {
               return fallback;
            }
            const value = Number(params.get(name));
            if (!Number.isFinite(value)) {
               return fallback;
            }
            return Math.max(min, Math.min(max, Math.trunc(value)));
         };
         const frameSamples = boundedNumber("frame_samples", 8, 1, 30);
         const framesPerSample = boundedNumber("frames_per_sample", 30, 1, 120);
         const rafFrames = boundedNumber("raf_frames", 2000, 2000, 20000);
         const rafResizeEvery = boundedNumber("raf_resize_every", 0, 0, 20000);
         const rafScene = boundedNumber("raf_scene", 0, 0, 16);
         const idMaskSamples = boundedNumber("id_mask_samples", 6, 1, 30);
         const idMaskFrames = boundedNumber("id_mask_frames", 24, 1, 120);
         const uploadSamples = boundedNumber("upload_samples", 6, 1, 30);
         const uploadFrames = boundedNumber("upload_frames", 24, 1, 120);
         const scene3dSamples = boundedNumber("scene3d_samples", 6, 1, 30);
         const scene3dFrames = boundedNumber("scene3d_frames", 24, 1, 120);
         const mixedSamples = boundedNumber("mixed_samples", 6, 1, 30);
         const mixedFrames = boundedNumber("mixed_frames", 24, 1, 120);
         const architectureMatrix = params.get("architecture_matrix") === "1";
         const preparedOnly = params.get("prepared_only") === "1";
         const preparedDirty = params.get("prepared_dirty") === "1";
         const preparedFlat = params.get("prepared_flat") === "1";
         const preparedThreshold = boundedNumber("prepared_threshold", 8, 1, 1024);
         const canvasDiag = params.get("canvas_diag") === "1";
         const canvasSamples = boundedNumber("canvas_samples", 6, 1, 30);
         const canvasFrames = boundedNumber("canvas_frames", 24, 1, 120);
         const canvasQuads = boundedNumber("canvas_quads", 512, 1, 4096);
         const captureTarget = params.get("capture_target") || "app";
         const captureOnly = params.get("capture_only") === "1";
         const startupOnly = params.get("startup_only") === "1";
         const idMaskReferenceOnly = params.get("id_mask_reference_only") === "1";
         const captureWidth = boundedNumber("capture_width", Math.max(1, Math.trunc(window.innerWidth || 512)), 1, 4096);
         const captureHeight = boundedNumber("capture_height", Math.max(1, Math.trunc(window.innerHeight || 512)), 1, 4096);
         const benchTimeoutMs = boundedNumber("bench_timeout_ms", 60000, 1000, 300000);
         const nextAnimationFrame = () => new Promise(resolve => requestAnimationFrame(resolve));
         const benchMarkPrefix = canvasDiag ? "oxide-canvas-bench" : "oxide-webgpu-bench";
         const benchMarks = [];
         let wasmModule = null;
         let pendingBenchmarkId = "";
         let postedErrorReport = false;
         const wasmMemoryBytes = () => wasmModule?.memory?.buffer?.byteLength ?? 0;
         const roundMs = value => Math.round(value * 1000) / 1000;
         const browserStartup = {
            id: canvasDiag ? "web.wasm.canvas.browser_startup" : "web.wasm.webgpu.browser_startup",
            page_start_ms: 0,
            wasm_init_start_ms: 0,
            wasm_init_ms: 0,
            app_init_start_ms: 0,
            app_init_ms: 0,
            first_frame_start_ms: 0,
            first_frame_ms: 0,
            report_ready_ms: 0,
            wasm_memory_bytes: 0,
         };
         const measureStartup = async (field, action) => {
            const start = performance.now();
            browserStartup[`${field}_start_ms`] = roundMs(start - pageStartMs);
            const value = await action();
            browserStartup[`${field}_ms`] = roundMs(performance.now() - start);
            return value;
         };
         const measureFirstFrame = action => {
            const start = performance.now();
            browserStartup.first_frame_start_ms = roundMs(start - pageStartMs);
            const value = action();
            browserStartup.first_frame_ms = roundMs(performance.now() - start);
            return value;
         };
         const finalizeBrowserStartup = () => {
            browserStartup.report_ready_ms = roundMs(performance.now() - pageStartMs);
            browserStartup.wasm_memory_bytes = wasmMemoryBytes();
            return browserStartup;
         };
         const newMeasuredOxideApp = () => measureStartup("app_init", () => OxideWebApp.newAsync("oxide-canvas"));
         const jsHeapSupported = () => !!performance.memory && Number.isFinite(performance.memory.usedJSHeapSize);
         const jsHeapBytes = () => jsHeapSupported() ? Math.max(0, Math.trunc(performance.memory.usedJSHeapSize)) : 0;
         const collectJsHeapBytes = async () => {
            if (typeof window.gc === "function") {
               window.gc();
               await Promise.resolve();
               window.gc();
            }
            return jsHeapBytes();
         };
         const parseMetricString = value => Object.fromEntries(
            String(value)
               .split(";")
               .filter(Boolean)
               .map(part => {
                  const separator = part.indexOf("=");
                  return [part.slice(0, separator), Number(part.slice(separator + 1))];
               }),
         );
         const runRafFrameHarness = async frameCount => {
            const stageNames = [
               "event_update",
               "layout",
               "text_prepare",
               "draw_extraction",
               "coalescing",
               "backend_lowering",
               "upload",
               "command_encoding",
               "queue_submit",
               "post_submit_contract",
            ];
            const stages = Object.fromEntries(stageNames.map(name => [name, []]));
            const rafTimestampsMs = [];
            const rafDeltasMs = [];
            const cpuSubmitMs = [];
            const warmupCpuSubmitMs = [];
            const longTasks = [];
            let longTaskObserver = null;
            if (typeof PerformanceObserver === "function"
               && PerformanceObserver.supportedEntryTypes?.includes("longtask")) {
               longTaskObserver = new PerformanceObserver(list => {
                  for (let entry of list.getEntries()) {
                     longTasks.push({ start_ms: entry.startTime, duration_ms: entry.duration });
                  }
               });
               longTaskObserver.observe({ type: "longtask", buffered: true });
            }
            let previousTimestampMs = 0;
            const canvas = document.getElementById("oxide-canvas");
            const originalCanvasWidth = canvas.style.width;
            const originalCanvasHeight = canvas.style.height;
            window.oxideApp.set_scene(rafScene);
            for (let warmup = 0; warmup < 64; warmup += 1) {
               previousTimestampMs = await nextAnimationFrame();
               let metrics = parseMetricString(
                  window.oxideApp.frame_at_timestamp_profiled(previousTimestampMs),
               );
               warmupCpuSubmitMs.push(metrics.total_ms);
            }
            const instrumentationEnabledMs = [];
            const instrumentationDisabledMs = [];
            const instrumentationOrder = ["enabled", "disabled", "disabled", "enabled"];
            for (let sample = 0; sample < 400; sample += 1) {
               const timestampMs = await nextAnimationFrame();
               const mode = instrumentationOrder[sample % instrumentationOrder.length];
               const startMs = performance.now();
               if (mode === "enabled") {
                  parseMetricString(window.oxideApp.frame_at_timestamp_profiled(timestampMs));
                  instrumentationEnabledMs.push(performance.now() - startMs);
               } else {
                  window.oxideApp.frame_at_timestamp_unprofiled(timestampMs);
                  instrumentationDisabledMs.push(performance.now() - startMs);
               }
               previousTimestampMs = timestampMs;
            }
            window.oxideApp.begin_raf_gpu_timestamp_capture();
            for (let frame = 0; frame < frameCount; frame += 1) {
               if (rafResizeEvery > 0 && frame > 0 && frame % rafResizeEvery === 0) {
                  const inset = (frame / rafResizeEvery) % 2;
                  canvas.style.width = `calc(100vw - ${inset}px)`;
                  canvas.style.height = `calc(100vh - ${inset}px)`;
               }
               const timestampMs = await nextAnimationFrame();
               const metrics = parseMetricString(
                  window.oxideApp.frame_at_timestamp_profiled(timestampMs),
               );
               rafTimestampsMs.push(timestampMs);
               rafDeltasMs.push(timestampMs - previousTimestampMs);
               cpuSubmitMs.push(metrics.total_ms);
               for (let name of stageNames) {
                  stages[name].push(metrics[`${name}_ms`]);
               }
               previousTimestampMs = timestampMs;
            }
            const gpuTimestamps = JSON.parse(
               await window.oxideApp.finish_raf_gpu_timestamp_capture(),
            );
            canvas.style.width = originalCanvasWidth;
            canvas.style.height = originalCanvasHeight;
            longTaskObserver?.disconnect();
            return {
               classification: "browser-displayed-frames",
               production_path: 1,
               production_coalescing: "adjacent-order-preserving",
               production_damage_policy: "router-damage-handoff",
               submissions_per_raf: 1,
               scene_index: rafScene,
               resize_every_frames: rafResizeEvery,
               viewport_css: `${window.innerWidth}x${window.innerHeight}`,
               device_pixel_ratio: window.devicePixelRatio,
               cross_origin_isolated: window.crossOriginIsolated,
               warmup_frames: 64,
               warmup_cpu_submit_ms: warmupCpuSubmitMs,
               instrumentation_overhead: {
                  order: instrumentationOrder,
                  enabled_ms: instrumentationEnabledMs,
                  disabled_ms: instrumentationDisabledMs,
               },
               frames: frameCount,
               submissions: frameCount,
               raf_timestamps_ms: rafTimestampsMs,
               raf_deltas_ms: rafDeltasMs,
               cpu_submit_ms: cpuSubmitMs,
               cpu_stages_ms: stages,
               cpu_stage_attribution: {
                  layout: "fused-into-draw-extraction",
                  text_prepare: "fused-into-draw-extraction",
                  draw_extraction: "includes-scene-layout-and-text-prepare",
                  command_encoding: "surface+encoder+render+timestamp+scratch",
                  post_submit_contract: "present+timestamp-map+host-post-submit",
               },
               long_task_supported: longTaskObserver ? 1 : 0,
               long_tasks: longTasks,
               event_to_submit_status: "not-collected",
               event_to_visible_status: "not-collected",
               gpu_timestamp_status: gpuTimestamps.supported ? "collected" : "unsupported",
               gpu_timestamp_readback_skips: gpuTimestamps.readback_skips,
               queue_drain_ms: gpuTimestamps.queue_drain_ms,
               queue_drain_raf_waits: gpuTimestamps.queue_drain_raf_waits,
               queue_pending_initial: gpuTimestamps.queue_pending_initial,
               queue_pending_final: gpuTimestamps.queue_pending_final,
               gpu_timestamp_samples: gpuTimestamps.samples,
            };
         };
         const errorDetail = error => {
            if (error && typeof error.message === "string") {
               return error.message;
            }
            return String(error);
         };
         const postErrorReport = async (id, error) => {
            if (postedErrorReport || params.get("report_endpoint") !== "1") {
               return;
            }
            postedErrorReport = true;
            const report = {
               benchmark_error: {
                  id,
                  detail: errorDetail(error),
               },
               browser_startup: finalizeBrowserStartup(),
               benchmark_marks: benchMarks,
            };
            document.getElementById("oxide-browser-report-json").textContent = JSON.stringify(report);
            document.documentElement.dataset.oxideReportReady = "1";
            await fetch("/__oxide_report", {
               method: "POST",
               headers: { "Content-Type": "application/json" },
               body: JSON.stringify(report),
            });
         };
         const withBenchTimeout = (id, promise) => new Promise((resolve, reject) => {
            const timer = setTimeout(() => reject(new Error(`benchmark ${id} timed out after ${benchTimeoutMs}ms`)), benchTimeoutMs);
            Promise.resolve(promise).then(
               value => {
                  clearTimeout(timer);
                  resolve(value);
               },
               error => {
                  clearTimeout(timer);
                  reject(error);
               },
            );
         });
         const runBench = async (id, action) => {
            const start = `${benchMarkPrefix}:${id}:start`;
            const end = `${benchMarkPrefix}:${id}:end`;
            const measure = `${benchMarkPrefix}:${id}`;
            const jsHeapBeforeBytes = await collectJsHeapBytes();
            const wasmBeforeBytes = wasmMemoryBytes();
            const jsHeapSampleSupported = jsHeapSupported();
            const jsHeapGcAvailable = typeof window.gc === "function";
            let benchError = null;
            let result = "";
            pendingBenchmarkId = id;
            performance.mark(start);
            try {
               result = await withBenchTimeout(id, action());
            } catch (error) {
               benchError = error;
            } finally {
               const wasmAfterBytes = wasmMemoryBytes();
               performance.mark(end);
               performance.measure(measure, start, end);
               const jsHeapAfterBytes = await collectJsHeapBytes();
               const entries = performance.getEntriesByName(measure, "measure");
               const entry = entries[entries.length - 1];
               benchMarks.push({
                  id,
                  name: measure,
                  start_ms: Math.round(entry.startTime * 1000) / 1000,
                  duration_ms: Math.round(entry.duration * 1000) / 1000,
                  wasm_memory_before_bytes: wasmBeforeBytes,
                  wasm_memory_after_bytes: wasmAfterBytes,
                  wasm_memory_growth_bytes: Math.max(0, wasmAfterBytes - wasmBeforeBytes),
                  js_heap_sample_supported: jsHeapSampleSupported ? 1 : 0,
                  js_heap_gc_available: jsHeapGcAvailable ? 1 : 0,
                  js_heap_before_bytes: jsHeapBeforeBytes,
                  js_heap_after_bytes: jsHeapAfterBytes,
                  js_heap_growth_bytes: Math.max(0, jsHeapAfterBytes - jsHeapBeforeBytes),
               });
               pendingBenchmarkId = "";
            }
            if (benchError) {
               await postErrorReport(id, benchError);
               throw benchError;
            }
            return result;
         };
         window.addEventListener("error", event => {
            void postErrorReport(pendingBenchmarkId || "page-error", event.error || event.message);
         });
         window.addEventListener("unhandledrejection", event => {
            void postErrorReport(pendingBenchmarkId || "unhandled-rejection", event.reason);
         });

         wasmModule = await measureStartup("wasm_init", () => init());
         if (canvasDiag) {
            window.oxideCanvasIndexedQuads = await runBench("canvas_indexed_quads", () => bench_canvas_indexed_quads(canvasSamples, canvasFrames, canvasQuads));
            console.log("oxide-canvas-indexed-quads", window.oxideCanvasIndexedQuads);
            const report = {
               browser_startup: finalizeBrowserStartup(),
               backend: "canvas2d",
               canvas_diag: window.oxideCanvasIndexedQuads,
               benchmark_marks: benchMarks,
            };
            document.getElementById("oxide-browser-report-json").textContent = JSON.stringify(report);
            document.documentElement.dataset.oxideReportReady = "1";
            if (params.get("report_endpoint") === "1") {
               await fetch("/__oxide_report", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(report),
               });
            }
         } else {
         window.oxidePlatformSmoke = platform_smoke_report();
         console.log("oxide-platform-smoke", window.oxidePlatformSmoke);
         window.oxideWebGpuSmoke = await webgpu_smoke_report();
         console.log("oxide-webgpu-smoke", window.oxideWebGpuSmoke);
         window.oxideWebGpuTiming = await webgpu_timing_report();
         console.log("oxide-webgpu-timing", window.oxideWebGpuTiming);
         window.oxideWebGpuAppSnapshot = "";
         window.oxideWebGpuScene3dSnapshot = "";
         window.oxideWebGpuGlyphSnapshot = "";
         window.oxideWebGpuPreparedSnapshot = "";
         window.oxideWebGpuLocalLayersSnapshot = "";
         window.oxideWebGpuIdMaskSnapshot = "";
         window.oxideWebGpuIdMaskReference = "";
         if (idMaskReferenceOnly) {
            window.oxideApp = await newMeasuredOxideApp();
            window.oxideWebGpuIdMaskReference = await window.oxideApp.read_webgpu_asymmetric_id_mask_fields();
            console.log("oxide-webgpu-id-mask-reference", window.oxideWebGpuIdMaskReference);
         } else if (captureTarget === "app" && captureOnly) {
            window.oxideApp = await newMeasuredOxideApp();
            window.oxideWebGpuAppSnapshot = measureFirstFrame(() => window.oxideApp.render_webgpu_app_snapshot());
            console.log("oxide-webgpu-app-snapshot", window.oxideWebGpuAppSnapshot);
            for (let frame = 0; frame < 8; frame += 1) {
               await nextAnimationFrame();
            }
         } else if (captureTarget === "scene3d") {
            window.oxideApp = await newMeasuredOxideApp();
            window.oxideWebGpuScene3dSnapshot = measureFirstFrame(() => window.oxideApp.render_webgpu_scene3d_snapshot(captureWidth, captureHeight));
            console.log("oxide-webgpu-scene3d-snapshot", window.oxideWebGpuScene3dSnapshot);
            if (captureOnly) {
               for (let frame = 0; frame < 3; frame += 1) {
                  await nextAnimationFrame();
               }
            }
         } else if (captureTarget === "glyph") {
            window.oxideApp = await newMeasuredOxideApp();
            window.oxideWebGpuGlyphSnapshot = measureFirstFrame(() => window.oxideApp.render_webgpu_glyph_snapshot());
            console.log("oxide-webgpu-glyph-snapshot", window.oxideWebGpuGlyphSnapshot);
            if (captureOnly) {
               for (let frame = 0; frame < 3; frame += 1) {
                  await nextAnimationFrame();
               }
            }
         } else if (captureTarget === "prepared") {
            window.oxideApp = await newMeasuredOxideApp();
            window.oxideWebGpuPreparedSnapshot = measureFirstFrame(() => window.oxideApp.render_webgpu_prepared_snapshot(preparedFlat));
            console.log("oxide-webgpu-prepared-snapshot", window.oxideWebGpuPreparedSnapshot);
            if (captureOnly) {
               for (let frame = 0; frame < 3; frame += 1) {
                  await nextAnimationFrame();
               }
            }
         } else if (captureTarget === "local-layers") {
            window.oxideApp = await newMeasuredOxideApp();
            window.oxideWebGpuLocalLayersSnapshot = measureFirstFrame(() => window.oxideApp.render_webgpu_local_layers_c30());
            console.log("oxide-webgpu-local-layers-snapshot", window.oxideWebGpuLocalLayersSnapshot);
            if (captureOnly) {
               for (let frame = 0; frame < 3; frame += 1) {
                  await nextAnimationFrame();
               }
            }
         } else if (captureTarget === "id-mask") {
            window.oxideApp = await newMeasuredOxideApp();
            window.oxideWebGpuIdMaskSnapshot = measureFirstFrame(() => window.oxideApp.render_webgpu_id_mask_snapshot());
            console.log("oxide-webgpu-id-mask-snapshot", window.oxideWebGpuIdMaskSnapshot);
            if (captureOnly) {
               for (let frame = 0; frame < 3; frame += 1) {
                  await nextAnimationFrame();
                  window.oxideWebGpuIdMaskSnapshot = window.oxideApp.render_webgpu_id_mask_snapshot();
               }
               await nextAnimationFrame();
            }
         } else {
            window.oxideApp = await newMeasuredOxideApp();
            if (params.get("report_endpoint") !== "1") {
               window.oxideApp.start();
            }
            measureFirstFrame(() => window.oxideApp.frame());
         }
         console.log("oxide-renderer-backend", window.oxideApp.renderer_backend());
         console.log("oxide-render-smoke", `draws=${window.oxideApp.last_draw_count()}`);
         window.oxideWebPerf = "";
         window.oxideWebRafPerf = null;
         window.oxideWebGpuIdMaskCurrent = "";
         window.oxideWebGpuUploadCurrent = "";
         window.oxideWebGpuEffectUniformAB = "";
         window.oxideWebGpuBackdropBatchAB = "";
         window.oxideWebGpuScene3dAB = "";
         window.oxideWebGpuMixedMatrix = "";
         window.oxideWebGpuLayerEffectsMatrix = "";
         window.oxideWebGpuCleanLayerAB = "";
         window.oxideWebGpuCommandFamilyMatrix = "";
         window.oxideWebGpuGlyphRunCurrent = "";
         window.oxideWebGpuNeonMarkerAB = "";
         window.oxideWebGpuDirectSurfaceAB = "";
         window.oxideWebGpuArchitecturePrimitives = "";
         window.oxideWebGpuPreparedChunks = "";
         window.oxideWebGpuDrawItemCoalescingAB = "";
         window.oxideWebGpuDrawStateCacheAB = "";
         window.oxideWebGpuClipStateAB = "";
         window.oxideWebBenchmarkMarks = benchMarks;
         if (preparedOnly) {
            window.oxideApp.prewarm_webgpu_bench_resources();
            window.oxideWebGpuPreparedChunks = await runBench("prepared_chunks", () => window.oxideApp.bench_webgpu_prepared_chunks(mixedSamples, mixedFrames, preparedDirty, preparedFlat, preparedThreshold));
            console.log("oxide-webgpu-prepared-chunks", window.oxideWebGpuPreparedChunks);
         } else if (!captureOnly && !startupOnly && !idMaskReferenceOnly) {
            window.oxideApp.prewarm_webgpu_bench_resources();
            if (architectureMatrix) {
               window.oxideWebGpuArchitecturePrimitives = await runBench("architecture_primitives", () => window.oxideApp.bench_webgpu_architecture_primitives(mixedSamples, mixedFrames));
               console.log("oxide-webgpu-architecture-primitives", window.oxideWebGpuArchitecturePrimitives);
            }
            window.oxideWebPerf = await runBench("cpu_submit_throughput", () => window.oxideApp.bench_cpu_submit_samples(frameSamples, framesPerSample));
            console.log("oxide-web-cpu-submit-throughput", window.oxideWebPerf);
            window.oxideWebRafPerf = await runBench("raf_frame_loop", () => runRafFrameHarness(rafFrames));
            console.log("oxide-web-raf-frame-perf", window.oxideWebRafPerf);
            window.oxideWebGpuIdMaskCurrent = await runBench("id_mask_current", () => window.oxideApp.bench_webgpu_id_mask_current(idMaskSamples, idMaskFrames));
            console.log("oxide-webgpu-id-mask-current", window.oxideWebGpuIdMaskCurrent);
            window.oxideWebGpuUploadCurrent = await runBench("upload_current", () => window.oxideApp.bench_webgpu_upload_current(uploadSamples, uploadFrames));
            console.log("oxide-webgpu-upload-current", window.oxideWebGpuUploadCurrent);
            window.oxideWebGpuEffectUniformAB = await runBench("effect_uniform_ab", () => window.oxideApp.bench_webgpu_effect_uniform_ab(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-effect-uniform-ab", window.oxideWebGpuEffectUniformAB);
            window.oxideWebGpuBackdropBatchCurrent = await runBench("backdrop_batch_current", () => window.oxideApp.bench_webgpu_backdrop_batch_current(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-backdrop-batch-current", window.oxideWebGpuBackdropBatchCurrent);
            window.oxideWebGpuScene3dAB = await runBench("scene3d_ab", () => window.oxideApp.bench_webgpu_scene3d_ab(scene3dSamples, scene3dFrames));
            console.log("oxide-webgpu-scene3d-ab", window.oxideWebGpuScene3dAB);
            window.oxideWebGpuMixedMatrix = await runBench("mixed_matrix", () => window.oxideApp.bench_webgpu_mixed_matrix(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-mixed-matrix", window.oxideWebGpuMixedMatrix);
            window.oxideWebGpuLayerEffectsMatrix = await runBench("layer_effects_matrix", () => window.oxideApp.bench_webgpu_layer_effects_matrix(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-layer-effects-matrix", window.oxideWebGpuLayerEffectsMatrix);
            window.oxideWebGpuCleanLayerAB = await runBench("clean_layer_ab", () => window.oxideApp.bench_webgpu_clean_layer_ab(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-clean-layer-ab", window.oxideWebGpuCleanLayerAB);
            window.oxideWebGpuCommandFamilyMatrix = await runBench("command_family_matrix", () => window.oxideApp.bench_webgpu_command_family_matrix(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-command-family-matrix", window.oxideWebGpuCommandFamilyMatrix);
            window.oxideWebGpuGlyphRunCurrent = await runBench("glyph_run_current", () => window.oxideApp.bench_webgpu_glyph_run_current(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-glyph-run-current", window.oxideWebGpuGlyphRunCurrent);
            window.oxideWebGpuNeonMarkerAB = await runBench("neon_marker_ab", () => window.oxideApp.bench_webgpu_neon_marker_ab(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-neon-marker-ab", window.oxideWebGpuNeonMarkerAB);
            window.oxideWebGpuDirectSurfaceAB = await runBench("direct_surface_ab", () => window.oxideApp.bench_webgpu_direct_surface_ab(mixedSamples, mixedFrames));
            console.log("oxide-webgpu-direct-surface-ab", window.oxideWebGpuDirectSurfaceAB);
            if (captureTarget === "id-mask") {
               window.oxideWebGpuIdMaskSnapshot = window.oxideApp.render_webgpu_id_mask_snapshot();
               console.log("oxide-webgpu-id-mask-snapshot", window.oxideWebGpuIdMaskSnapshot);
            }
         }
         const report = {
            browser_startup: finalizeBrowserStartup(),
            platform: window.oxidePlatformSmoke,
            webgpu: window.oxideWebGpuSmoke,
            webgpu_timing: window.oxideWebGpuTiming,
            backend: window.oxideApp.renderer_backend(),
            render: `draws=${window.oxideApp.last_draw_count()}`,
            frame_perf: window.oxideWebPerf,
            raf_frame_perf: window.oxideWebRafPerf,
            id_mask_current: window.oxideWebGpuIdMaskCurrent,
            upload_current: window.oxideWebGpuUploadCurrent,
            effect_uniform_ab: window.oxideWebGpuEffectUniformAB,
            backdrop_batch_current: window.oxideWebGpuBackdropBatchCurrent,
            scene3d_ab: window.oxideWebGpuScene3dAB,
            mixed_matrix: window.oxideWebGpuMixedMatrix,
            layer_effects_matrix: window.oxideWebGpuLayerEffectsMatrix,
