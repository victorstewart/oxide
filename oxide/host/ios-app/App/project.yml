name: OxideHost
options:
  developmentLanguage: en
  deploymentTarget:
    iOS: 18.0
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
schemes:
  OxideUIKitPerf:
    build:
      targets:
        OxideHost:
          - test
        OxideHostPerfTests:
          - test
        OxideHostUITests:
          - test
      buildImplicitDependencies: false
    test:
      targets:
        - OxideHostPerfTests
        - OxideHostUITests
targets:
  OxideHost:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - OxideHost.xcodeproj
          - project.yml
          - OxideHostUITests
          - OxideHostPerfTests
          - PerfShared
          - Resources
      - path: PerfShared
    resources:
      - Info.plist
      - capabilities.toml
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oxide.host
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_BITCODE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        OTHER_LDFLAGS:
          - "-ObjC"
          - "-lc++"
          - "-framework"
          - UIKit
          - "-framework"
          - Foundation
          - "-framework"
          - QuartzCore
          - "-framework"
          - Metal
          - "-framework"
          - CoreGraphics
          - "-framework"
          - UserNotifications
          - "-framework"
          - CoreLocation
          - "-framework"
          - AVFoundation
          - "-framework"
          - Contacts
          - "-framework"
          - CoreBluetooth
          - "-framework"
          - CoreMotion
          - "$(BUILT_PRODUCTS_DIR)/liboxide_host_ios.a"
        INFOPLIST_FILE: Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
    prebuildScripts:
      - name: Build + Embed Rust Staticlib
        shell: /bin/sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/liboxide_host_ios.a"
        script: |
          set -euo pipefail
          PROJECT_DIR="${PROJECT_DIR}"
          REPO_ROOT="$(cd "${PROJECT_DIR}/../../.." && pwd)"
          export CARGO_TARGET_DIR="${REPO_ROOT}/target"
          # Determine Rust target triple from SDK
          case "${PLATFORM_NAME}" in
            iphoneos)
              RUST_TARGET="aarch64-apple-ios"
              ;;
            *)
              RUST_TARGET="aarch64-apple-ios-sim"
              ;;
          esac
          HOST_LINKER_WRAPPER="${CARGO_TARGET_DIR}/xcode-host-clang.sh"
          cat > "${HOST_LINKER_WRAPPER}" <<'EOF'
          #!/bin/sh
          exec xcrun --sdk macosx clang "$@"
          EOF
          chmod +x "${HOST_LINKER_WRAPPER}"
          echo "Building Rust staticlib for ${RUST_TARGET}…"
          (cd "${REPO_ROOT}/host/ios-app/oxide-host-ios" && \
             export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER="${HOST_LINKER_WRAPPER}" && \
             unset SDKROOT SDK_DIR SDK_NAME IPHONEOS_DEPLOYMENT_TARGET && \
             cargo build -p oxide-host-ios --release --features perf-host-stubs --target "${RUST_TARGET}")
          mkdir -p "${BUILT_PRODUCTS_DIR}"
          SRC="${CARGO_TARGET_DIR}/${RUST_TARGET}/release/liboxide_host_ios.a"
          cp -v "${SRC}" "${BUILT_PRODUCTS_DIR}/liboxide_host_ios.a"
    scheme:
      testTargets:
        - OxideHostUITests
  OxideHostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OxideHostUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oxide.host.UITests
        INFOPLIST_FILE: OxideHostUITests/Info.plist
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
    dependencies:
      - target: OxideHost
  OxideHostPerfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PerfShared
      - path: OxideHostPerfTests
    dependencies:
      - target: OxideHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oxide.host.PerfTests
        INFOPLIST_FILE: OxideHostPerfTests/Info.plist
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: 18.0
