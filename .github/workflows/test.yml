name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.86.0
          profile: minimal
          override: true
          components: rustfmt, clippy
      - name: Install cargo-hack
        run: cargo install cargo-hack --version 0.5.29
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -D warnings
      - name: test (all features)
        run: cargo test --workspace --all-targets --all-features --quiet
      - name: test (no default features)
        run: cargo test --workspace --no-default-features --quiet
      - name: feature matrix (best effort)
        run: cargo hack check --each-feature --no-dev-deps || true

  mac-metal-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: 1.86.0
          profile: minimal
          override: true
      - name: Build renderer-metal with snapshot tests gated
        run: |
          cargo build -p oxideui-renderer-metal --features snapshot-tests
      - name: Host iOS bridge unit tests
        run: cargo test -p oxideui-host-ios --lib --tests
      - name: macOS host smoke build
        run: cargo build -p oxideui-host-macos

